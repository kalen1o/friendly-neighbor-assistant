services:
  # ── Only the database runs in Docker ──
  db:
    image: pgvector/pgvector:pg16
    container_name: fn-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-friendly}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-friendly_secret}
      POSTGRES_DB: ${POSTGRES_DB:-friendly_neighbor}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-friendly}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fn-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
